{% extends 'base.html' %}
{% block title %}Upload Document{% endblock %}
{% block content %}
<section class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="card-title mb-4"><i class="bi bi-upload text-primary"></i> Upload Document</h4>
                <form id="uploadForm" method="POST" action="{{ url_for('upload') }}" enctype="multipart/form-data" novalidate>
                    <div class="mb-3">
                        <label class="form-label">Document Title <span class="text-danger">*</span></label>
                        <input type="text" name="title" id="docTitle" class="form-control" placeholder="e.g. Chapter 3 Notes" required>
                        <div class="invalid-feedback">Title is required.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">File <span class="text-danger">*</span></label>
                        <input type="file" name="file" id="docFile" class="form-control" accept=".pdf,.docx,.pptx,.ppt,.doc" required>
                        <div class="form-text">Allowed: PDF, DOCX, PPTX (max 16MB)</div>
                        <div class="invalid-feedback">Please select a file.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <input type="text" name="subject" class="form-control" placeholder="e.g. Mathematics">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tags</label>
                        <input type="text" name="tags" class="form-control" placeholder="e.g. algebra, calculus, exam">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Difficulty Level</label>
                        <select name="difficulty" class="form-select">
                            <option value="1">1 - Easy</option>
                            <option value="2" selected>2 - Medium</option>
                            <option value="3">3 - Hard</option>
                        </select>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-cloud-upload"></i> Upload</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
