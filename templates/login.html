{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="card-title text-center mb-4"><i class="bi bi-box-arrow-in-right text-primary"></i> Login</h4>
                <form id="loginForm" method="POST" action="{{ url_for('login') }}" novalidate>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" id="loginEmail" class="form-control" placeholder="you@example.com" required>
                        <div class="invalid-feedback">Enter a valid email.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" id="loginPassword" class="form-control" placeholder="Password" required>
                        <div class="invalid-feedback">Password is required.</div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Login</button>
                    </div>
                </form>
                <p class="text-center mt-3 mb-0">No account? <a href="{{ url_for('register') }}">Register here</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
